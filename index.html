<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:wght@400;500&family=Crimson+Pro:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f7f4ef;
    --text: #1a1814;
    --muted: #8a8070;
    --divider: #c8bfb0;
    --btn-bg: rgba(0,0,0,0.05);
    --btn-hover: rgba(0,0,0,0.1);
  }

  body.dark {
    --bg: #131210;
    --text: #e8e4dc;
    --muted: #6b6357;
    --divider: #2e2b26;
    --btn-bg: rgba(255,255,255,0.06);
    --btn-hover: rgba(255,255,255,0.1);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .container {
    text-align: center;
    padding: 2rem;
    width: 100%;
  }

  .day {
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.4s ease;
  }

  .time {
    font-family: 'EB Garamond', 'Times New Roman', serif;
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: color 0.4s ease;
  }

  .ampm {
    display: block;
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-top: 0.4em;
    min-height: 1em;
    transition: color 0.4s ease;
  }

  .date {
    font-family: 'Lora', Georgia, serif;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--muted);
    transition: color 0.4s ease;
  }

  .divider {
    height: 1px;
    background: var(--divider);
    margin-left: auto;
    margin-right: auto;
    transition: background 0.4s ease;
  }

  .ui-btn {
    position: fixed;
    background: var(--btn-bg);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  .ui-btn:hover { background: var(--btn-hover); }

  #themeBtn      { top: 1.2rem; right: 1.2rem; }
  #fullscreenBtn { top: 1.2rem; left:  1.2rem; }
</style>
</head>
<body>

<button class="ui-btn" id="fullscreenBtn" aria-label="Toggle fullscreen"></button>
<button class="ui-btn" id="themeBtn" aria-label="Toggle dark mode"></button>

<div class="container">
  <div class="day" id="day"></div>
  <div class="divider" id="div1"></div>
  <div class="time" id="time" title="Tap to toggle 12h / 24h">
    <span id="timeText"></span>
    <span class="ampm" id="ampm"></span>
  </div>
  <div class="divider" id="div2"></div>
  <div class="date" id="date"></div>
</div>

<script>
  var DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  var is24h     = false;
  var isDark    = false;
  var lastMin   = -1;
  var wakeLock  = null;

  function pad(n) { return n < 10 ? '0' + n : n; }

  function update() {
    var now = new Date();
    var h   = now.getHours();
    var m   = now.getMinutes();

    if (m !== lastMin) {
      lastMin = m;
    }

    var display, ampmStr = '';
    if (is24h) {
      display = pad(h) + ':' + pad(m);
    } else {
      ampmStr = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      display = pad(h) + ':' + pad(m);
    }

    document.getElementById('timeText').textContent = display;
    document.getElementById('ampm').textContent     = ampmStr;
    document.getElementById('day').textContent      = DAYS[now.getDay()];
    document.getElementById('date').textContent     = MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  function resize() {
    var vw   = window.innerWidth;
    var vh   = window.innerHeight;
    var base = Math.min(vw, vh);

    document.getElementById('time').style.fontSize     = (base * 0.28)  + 'px';
    document.getElementById('day').style.fontSize      = (base * 0.038) + 'px';
    document.getElementById('date').style.fontSize     = (base * 0.038) + 'px';
    document.getElementById('ampm').style.fontSize     = (base * 0.032) + 'px';

    var dividers = document.querySelectorAll('.divider');
    for (var i = 0; i < dividers.length; i++) {
      dividers[i].style.width         = (base * 0.08) + 'px';
      dividers[i].style.marginTop     = (vh   * 0.04) + 'px';
      dividers[i].style.marginBottom  = (vh   * 0.04) + 'px';
    }

    var btnSize = Math.max(40, base * 0.07) + 'px';
    var btnFont = Math.max(16, base * 0.032) + 'px';
    ['themeBtn', 'fullscreenBtn'].forEach(function(id) {
      var btn = document.getElementById(id);
      btn.style.width    = btnSize;
      btn.style.height   = btnSize;
      btn.style.fontSize = btnFont;
    });
  }

  function setTheme(dark) {
    isDark = dark;
    document.body.classList.toggle('dark', dark);
    document.getElementById('themeBtn').textContent = dark ? '☀' : '☽';
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  }

  function updateFullscreenIcon() {
    var btn = document.getElementById('fullscreenBtn');
    btn.textContent = isFullscreen() ? '✕' : '⤢';
    btn.title       = isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen';
  }

  function toggleFullscreen() {
    if (isFullscreen()) {
      var exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
      if (exit) exit.call(document);
    } else {
      var el = document.documentElement;
      var enter = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      if (enter) enter.call(el);
    }
  }

  document.addEventListener('fullscreenchange',       updateFullscreenIcon);
  document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
  document.addEventListener('mozfullscreenchange',    updateFullscreenIcon);

  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

  document.getElementById('themeBtn').addEventListener('click', function() {
    setTheme(!isDark);
  });

  document.getElementById('time').addEventListener('click', function() {
    is24h   = !is24h;
    lastMin = -1;
    update();
  });

  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  requestWakeLock();
  setTheme(false);
  updateFullscreenIcon();
  update();
  resize();
  setInterval(update, 5000);
  window.addEventListener('resize', resize);
</script>
</body>
</html>

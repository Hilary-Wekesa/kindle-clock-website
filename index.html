<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f7f4ef;
    color: #1a1814;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  html, body {
    height: 100%;
  }

  .container {
    text-align: center;
    padding: 2rem;
    width: 100%;
  }

  .day {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #8a8070;
    margin-bottom: 1.5rem;
  }

  .time {
    font-family: 'DM Serif Display', serif;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #1a1814;
    margin-bottom: 1.5rem;
  }

  .date {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #8a8070;
  }

  .divider {
    height: 1px;
    background: #c8bfb0;
    margin: 1.5rem auto;
  }
</style>
</head>
<body>
<div class="container">
  <div class="day" id="day"></div>
  <div class="divider"></div>
  <div class="time" id="time"></div>
  <div class="divider"></div>
  <div class="date" id="date"></div>
</div>

<script>
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function pad(n) { return n < 10 ? '0' + n : n; }

  function update() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    if (h === 0) h = 12;

    document.getElementById('day').textContent = days[now.getDay()];
    document.getElementById('time').textContent = pad(h) + ':' + pad(m);
    document.getElementById('date').textContent = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  function resize() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var base = Math.min(vw, vh);

    document.getElementById('time').style.fontSize = (base * 0.28) + 'px';
    document.getElementById('day').style.fontSize = (base * 0.038) + 'px';
    document.getElementById('date').style.fontSize = (base * 0.038) + 'px';

    var dividers = document.querySelectorAll('.divider');
    for (var i = 0; i < dividers.length; i++) {
      dividers[i].style.width = (base * 0.08) + 'px';
      dividers[i].style.marginTop = (vh * 0.04) + 'px';
      dividers[i].style.marginBottom = (vh * 0.04) + 'px';
    }
  }

  update();
  resize();
  setInterval(update, 10000);
  window.addEventListener('resize', resize);
</script>
</body>
</html>
